<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/main.css">
  <script src="js/theme-toggle.js"></script>
  <script src="js/font-loader.js"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
</head>

<body>

  <!-- ─── Activity Bar (icon strip, far left) ─────────────────── -->
  <aside class="activity-bar">
    <div class="activity-bar-top">
      <a href="index.html" class="activity-icon">
        <i class="fa-solid fa-list-check"></i>
        <span class="btn-title">To-Do List</span>
      </a>
      <a href="notes.html" class="activity-icon active">
        <i class="fa-solid fa-note-sticky"></i>
        <span class="btn-title">Notes</span>
      </a>
      <a href="markdown.html" class="activity-icon">
        <i class="fa-solid fa-book-open"></i>
        <span class="btn-title">Markdown Reader</span>
      </a>
      <a href="settings.html" class="activity-icon">
        <i class="fa-solid fa-gear"></i>
        <span class="btn-title">Settings</span>
      </a>
    </div>
  </aside>

  <!-- ─── Floating Alerts ─────────────────────────────────────── -->
  <div class="alerts-floating">
    <div id="success-message" class="alert alert-success" role="alert">Success!</div>
    <div id="failure-message" class="alert alert-danger" role="alert">Failures!</div>
  </div>

  <!-- ─── Main Content ──────────────────────────────────────────── -->
  <div id="app-shell">
    <h5 id="notes-detail-title" class="px-5 pt-3 pb-1 font-semibold text-sm truncate">Title</h5>
    <div id="notes-detail-container"></div>
  </div>

  <!-- ─── Markdown Section Editor Modal ────────────────────────── -->
  <dialog id="md-section-modal">
    <div class="md-section-modal-toolbar">
      <div class="flex items-center gap-2">
        <h5 id="md-section-modal-title" class="font-semibold text-sm truncate">Edit Section</h5>
      </div>
      <div class="flex items-center gap-2">
        <button id="md-section-update-btn" class="btn btn-lite-sm btn-no-bg-gray" type="button">
          <i class="fa-solid fa-check"></i>
          <span class="btn-title">Update</span>
        </button>
        <button id="md-section-cancel-btn" class="btn btn-lite-sm btn-no-bg-gray" type="button">
          <i class="fa-solid fa-xmark"></i>
          <span class="btn-title">Cancel</span>
        </button>
      </div>
    </div>
    <div class="md-editor">
      <div class="md-editor-pane">
        <textarea id="md-section-input" placeholder="Write markdown here…" spellcheck="false"></textarea>
      </div>
      <div class="md-preview-pane">
        <div id="md-section-output" class="prose"></div>
      </div>
    </div>
  </dialog>

  <div id="page-context-menu" class="context-menu">
    <ul class="list-group">
      <li class="list-group-item"><button id="ctx-page-rename" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-pen mr-2"></i><span>Rename</span>
        </button>
      </li>
      <li class="list-group-item"><button id="ctx-page-export" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-download mr-2"></i><span>Export</span>
        </button>
      </li>
      <li class="list-group-item"><button id="ctx-page-delete" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-trash mr-2"></i><span>Delete</span>
        </button>
      </li>
    </ul>
  </div>

  <div id="section-context-menu" class="context-menu">
    <ul class="list-group">
      <li class="list-group-item"><button id="ctx-section-hide" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-eye mr-2"></i><span>Hide</span>
        </button>
      </li>
      <li class="list-group-item"><button id="ctx-section-md" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-brands fa-markdown mr-2"></i><span>Markdown</span>
        </button>
      </li>
      <li class="list-group-item"><button id="ctx-section-up" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-caret-up mr-2"></i><span>Move Up</span>
        </button>
      </li>
      <li class="list-group-item"><button id="ctx-section-down" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-caret-down mr-2"></i><span>Move Down</span>
        </button>
      </li>
      <li class="list-group-item"><button id="ctx-section-delete" class="btn btn-lite-sm btn-no-bg">
          <i class="fa-solid fa-trash mr-2"></i><span>Delete</span>
        </button>
      </li>
    </ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>
  <script type="module" src="js/notes-detail.js"></script>
  <script type="module" src="js/notes-listeners.js"></script>

</body>

</html>
