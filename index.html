<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List & Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/main.css">
    <script src="js/theme-toggle.js"></script>
    <script src="js/font-loader.js"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
</head>

<body>

    <!-- ─── Activity Bar (icon strip, far left) ─────────────────── -->
    <aside class="activity-bar">
        <div class="activity-bar-top">
            <a href="index.html" class="activity-icon active">
                <i class="fa-solid fa-list-check"></i>
                <span class="btn-title">To-Do List</span>
            </a>
            <a href="notes.html" class="activity-icon">
                <i class="fa-solid fa-note-sticky"></i>
                <span class="btn-title">Notes</span>
            </a>
            <a href="markdown.html" class="activity-icon">
                <i class="fa-solid fa-book-open"></i>
                <span class="btn-title">Markdown Reader</span>
            </a>
            <a href="settings.html" class="activity-icon">
                <i class="fa-solid fa-gear"></i>
                <span class="btn-title">Settings</span>
            </a>
        </div>
    </aside>

    <!-- ─── Floating Alerts ─────────────────────────────────────── -->
    <div class="alerts-floating">
        <div id="success-message" class="alert alert-success" role="alert">Success!</div>
        <div id="failure-message" class="alert alert-danger" role="alert">Failures!</div>
    </div>

    <!-- ─── Main Layout (sidebar + content) ─────────────────────── -->
    <div id="app-shell">
        <div id="date-parent-container">
            <div id="date-list-nav-container">
                <div id="create-date-row">
                    <input type="date" class="form-control" id="todo-date-input">
                    <button id="todo-date-submit" type="button" class="btn btn-lite-sm btn-no-bg">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div id="date-nav-content"></div>
            </div>
            <div id="date-list-container"></div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" data-bs-scroll="true" data-bs-backdrop="false" id="task-detail-container">

    </div>
    <div id="context-menu" class="context-menu">

        <ul class="list-group">
            <li class="list-group-item"><button id="ctx-done-btn" class="btn btn-lite-sm btn-no-bg">
                    <i class="fa-solid fa-circle-check mr-2"></i>
                    <span>Mark as Done/Undone</span>
                </button>
            </li>
            <li class="list-group-item"><button id="ctx-delete-btn" class="btn btn-lite-sm btn-no-bg">
                    <i class="fa-solid fa-trash mr-2"></i>
                    <span>Delete</span>
                </button>
            </li>
        </ul>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
<script type="module" src="js/refresh-worker.js"></script>
<script type="module" src="js/main.js"></script>
<script type="module" src="js/listeners.js"></script>
<script type="module" src="js/drag.js"></script>
<script type="module" src="js/mcp-bridge.js"></script>

</html>
